name: Setup pnpm and Node.js
description: Installs pnpm and configures Node.js with the pnpm store cache.

inputs:
  node-version:
    description: Node.js version to install
    default: '20'
  cache-dependency-path:
    description: >
      Path to pnpm-lock.yaml used as the cache key (relative to repo root).
      Omit to let setup-node auto-detect the lockfile.
    required: false

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
