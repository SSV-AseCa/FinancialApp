name: Setup Docker and login to GHCR
description: >
  Initialises Docker Buildx and authenticates with GitHub Container Registry
  using the workflow's GITHUB_TOKEN.

runs:
  using: composite
  steps:
    - shell: bash
      run: echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
