name: Build and publish versioned Docker image
description: >
  Reads the version sentinel written by @semantic-release/exec and builds + pushes
  a permanent versioned image to GHCR. All Docker steps are skipped silently when
  the sentinel file is absent (no release was made).

inputs:
  sentinel-path:
    description: Path to the .released-version file (e.g. api/.released-version)
    required: true
  image-name:
    description: Unqualified image name (e.g. ssv-api)
    required: true
  dockerfile:
    description: Path to the Dockerfile (e.g. api/Dockerfile)
    required: true
  context:
    description: Docker build context path (e.g. api/ or .)
    required: true

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      run: |
        if [ -f "${{ inputs.sentinel-path }}" ]; then
          echo "released=true" >> $GITHUB_OUTPUT
          echo "version=$(cat '${{ inputs.sentinel-path }}')" >> $GITHUB_OUTPUT
        else
          echo "released=false" >> $GITHUB_OUTPUT
        fi
    - uses: docker/setup-buildx-action@v3
      if: steps.check.outputs.released == 'true'
    - uses: docker/login-action@v3
      if: steps.check.outputs.released == 'true'
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - uses: docker/build-push-action@v6
      if: steps.check.outputs.released == 'true'
      with:
        push: true
        tags: ghcr.io/${{ lower(github.repository_owner) }}/${{ inputs.image-name }}:${{ steps.check.outputs.version }}
        file: ${{ inputs.dockerfile }}
        context: ${{ inputs.context }}
