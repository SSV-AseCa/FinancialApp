name: CI

on:
  pull_request:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Phase 0: Detect which modules are scaffolded ─────────────────────────────
  # hashFiles() is only valid in step-level if: conditions, not job-level ones.
  # This job exports boolean outputs read by all conditional jobs below.

  detect:
    name: Detect modules
    runs-on: ubuntu-latest
    outputs:
      ui-core: ${{ steps.check.outputs.ui-core }}
      web: ${{ steps.check.outputs.web }}
      mobile: ${{ steps.check.outputs.mobile }}
      api-dockerfile: ${{ steps.check.outputs.api-dockerfile }}
      web-dockerfile: ${{ steps.check.outputs.web-dockerfile }}
      mobile-dockerfile: ${{ steps.check.outputs.mobile-dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          exists() { [ -f "$1" ] && echo 'true' || echo 'false'; }
          echo "ui-core=$(exists packages/ui-core/package.json)"   >> $GITHUB_OUTPUT
          echo "web=$(exists apps/web/package.json)"               >> $GITHUB_OUTPUT
          echo "mobile=$(exists apps/mobile/package.json)"         >> $GITHUB_OUTPUT
          echo "api-dockerfile=$(exists api/Dockerfile)"           >> $GITHUB_OUTPUT
          echo "web-dockerfile=$(exists apps/web/Dockerfile)"      >> $GITHUB_OUTPUT
          echo "mobile-dockerfile=$(exists apps/mobile/Dockerfile)" >> $GITHUB_OUTPUT

  # ── Phase 1: Static analysis and unit tests (all parallel) ──────────────────

  api-lint:
    name: Lint — api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-gradle
      - run: ./gradlew spotlessCheck checkstyleMain pmdMain spotbugsMain
        working-directory: api

  api-test:
    name: Test — api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java-gradle
      - name: Run tests and coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
        working-directory: api
        env:
          EDGAR_API_KEY: ${{ secrets.EDGAR_API_KEY }}
          YAHOO_FINANCE_API_KEY: ${{ secrets.YAHOO_FINANCE_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: api/build/reports/jacoco/test/

  ui-core-lint:
    name: Lint — ui-core
    if: needs.detect.outputs.ui-core == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: packages/ui-core/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: packages/ui-core
      - run: pnpm lint
        working-directory: packages/ui-core
      - run: pnpm typecheck
        working-directory: packages/ui-core

  ui-core-test:
    name: Test — ui-core
    if: needs.detect.outputs.ui-core == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: packages/ui-core/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: packages/ui-core
      - run: pnpm test -- --run
        working-directory: packages/ui-core

  web-lint:
    name: Lint — web
    if: needs.detect.outputs.web == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web
      - run: pnpm lint
        working-directory: apps/web
      - run: pnpm typecheck
        working-directory: apps/web

  web-test:
    name: Test — web
    if: needs.detect.outputs.web == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web
      - run: pnpm test -- --run
        working-directory: apps/web

  mobile-lint:
    name: Lint — mobile
    if: needs.detect.outputs.mobile == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - run: pnpm lint
        working-directory: apps/mobile
      - run: pnpm typecheck
        working-directory: apps/mobile

  mobile-test:
    name: Test — mobile
    if: needs.detect.outputs.mobile == 'true'
    needs: [detect]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - run: pnpm test -- --run
        working-directory: apps/mobile

  # ── Phase 2: Builds + SonarCloud (all parallel, needs Phase 1) ─────────────
  #
  # Docker images are built on every run to verify Dockerfiles are healthy.
  # They are pushed to GHCR only on push to main, where e2e.yaml picks them up.
  # The compose files must support image override via environment variables:
  #   api:    image: ${API_IMAGE:-ssv-api:latest}
  #   web:    image: ${WEB_IMAGE:-ssv-web:latest}
  #   mobile: image: ${MOBILE_IMAGE:-ssv-mobile:latest}

  api-sonar:
    name: SonarCloud — api
    if: vars.SONARCLOUD_ENABLED == 'true'
    needs: [api-lint, api-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-java-gradle
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: api/build/reports/jacoco/test/
      - run: ./gradlew sonar -x test
        working-directory: api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ui-core-build:
    name: Build — ui-core
    if: needs.detect.outputs.ui-core == 'true'
    needs: [detect, ui-core-lint, ui-core-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: packages/ui-core/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: packages/ui-core
      - run: pnpm build
        working-directory: packages/ui-core
      - uses: actions/upload-artifact@v4
        with:
          name: ui-core-dist
          path: packages/ui-core/dist/

  api-build:
    name: Build — api
    if: needs.detect.outputs.api-dockerfile == 'true'
    needs: [detect, api-lint, api-test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-setup
      - uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.GHCR_OWNER }}/ssv-api:${{ github.sha }}

  web-build:
    name: Build — web
    if: needs.detect.outputs.web-dockerfile == 'true'
    needs: [detect, web-lint, web-test, ui-core-build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ui-core-dist
          path: packages/ui-core/dist/
      - uses: ./.github/actions/docker-setup
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.GHCR_OWNER }}/ssv-web:${{ github.sha }}

  mobile-build:
    name: Build — mobile
    if: needs.detect.outputs.mobile-dockerfile == 'true'
    needs: [detect, mobile-lint, mobile-test, ui-core-build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ui-core-dist
          path: packages/ui-core/dist/
      - uses: ./.github/actions/docker-setup
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mobile/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ env.GHCR_OWNER }}/ssv-mobile:${{ github.sha }}
