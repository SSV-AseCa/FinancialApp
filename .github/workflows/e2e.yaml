name: E2E

# Triggers only when the CI workflow completes on main.
# workflow_run gives us cross-workflow sequencing without duplicating jobs.
# Note: image references use github.event.workflow_run.head_sha, not github.sha,
# because in a workflow_run context github.sha is the SHA of the triggering event,
# not the original commit that CI ran against.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:

  # ── Phase 3+4: E2E tests (parallel) ─────────────────────────────────────────

  cypress:
    name: Cypress E2E — web
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-setup
      - name: Start full stack
        run: |
          API_IMAGE=ghcr.io/$GHCR_OWNER/ssv-api:${{ github.event.workflow_run.head_sha }} \
          WEB_IMAGE=ghcr.io/$GHCR_OWNER/ssv-web:${{ github.event.workflow_run.head_sha }} \
          docker compose up -d --no-build --wait
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          install-command: pnpm install --frozen-lockfile
          browser: chrome
          config: baseUrl=http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: apps/web/cypress/screenshots/

  appium:
    name: Appium E2E — mobile
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-setup
      - name: Start API and Android emulator container
        run: |
          API_IMAGE=ghcr.io/$GHCR_OWNER/ssv-api:${{ github.event.workflow_run.head_sha }} \
          MOBILE_IMAGE=ghcr.io/$GHCR_OWNER/ssv-mobile:${{ github.event.workflow_run.head_sha }} \
          docker compose -f api/docker-compose.yml -f apps/mobile/docker-compose.yml \
            up -d --no-build --wait
      - uses: ./.github/actions/setup-pnpm
        with:
          cache-dependency-path: apps/mobile/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mobile
      - name: Install Appium and uiautomator2 driver
        run: |
          pnpm add -g appium
          appium driver install uiautomator2
      - name: Run Appium tests
        run: pnpm run test:e2e
        working-directory: apps/mobile

  # ── Cleanup: delete GHCR images ─────────────────────────────────────────────
  # Runs even if E2E fails so transient images never accumulate in GHCR.
  # continue-on-error guards against the edge case where a build job failed
  # before pushing, leaving no image in GHCR to delete.

  cleanup:
    name: Cleanup — GHCR images
    if: always() && github.event.workflow_run.conclusion == 'success'
    needs: [cypress, appium]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ssv-api
          package-type: container
          package-version-names: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ssv-web
          package-type: container
          package-version-names: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ssv-mobile
          package-type: container
          package-version-names: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
