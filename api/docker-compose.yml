services:

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ssv
      POSTGRES_USER: ssv
      POSTGRES_PASSWORD: ssv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssv -d ssv"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-ssv-api:latest}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ssv
      SPRING_DATASOURCE_USERNAME: ssv
      SPRING_DATASOURCE_PASSWORD: ssv
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
