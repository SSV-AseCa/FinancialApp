# =============================================================================
# loadtest profile  --  LOCAL/CI LOAD TESTING ONLY. NEVER activate in production.
# -----------------------------------------------------------------------------
# Activates an offline HS256 JwtDecoder (LoadTestJwtDecoderConfig) so Locust can
# mint its own tokens with no Auth0 round-trip. The Auth0 decoder
# (Auth0JwtDecoderConfig, @Profile("!loadtest")) is disabled while this is active.
#
# Locust MUST sign tokens with the matching secret / issuer / audience below
# (see tests/load/common/config.py and tests/load/common/auth.py).
# =============================================================================

# Shared HMAC-SHA256 secret. Must be >= 32 bytes. Override per-run with
# LOADTEST_JWT_SECRET and keep it identical on the Locust side.
loadtest.jwt.secret=${LOADTEST_JWT_SECRET:ssv-loadtest-shared-secret-change-me-please-0123456789}
loadtest.jwt.issuer=${LOADTEST_JWT_ISSUER:https://loadtest.ssv.local/}

# Local audience the tokens must carry (enforced by AudienceValidator). Set blank
# to skip the audience check entirely.
auth0.audience=${LOADTEST_JWT_AUDIENCE:ssv-loadtest}

# Concrete placeholder so the context boots without any AUTH0_* env vars. The
# Auth0 decoder bean is NOT created under this profile, so this is never used to
# reach Auth0 -- it only satisfies property resolution.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${LOADTEST_JWT_ISSUER:https://loadtest.ssv.local/}
