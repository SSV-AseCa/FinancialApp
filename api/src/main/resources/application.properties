spring.application.name=ssv

edgar.base-url=${EDGAR_BASE_URL:https://data.sec.gov}
edgar.user-agent=${EDGAR_USER_AGENT:FinancialApp santinocolombo13@gmail.com}
edgar.api-key=${EDGAR_API_KEY:}
edgar.submissions-path=${EDGAR_SUBMISSIONS_PATH:/submissions/CIK%s.json}
edgar.company-facts-path=${EDGAR_COMPANY_FACTS_PATH:/api/xbrl/companyfacts/CIK%s.json}
edgar.staleness-days=${EDGAR_STALENESS_DAYS:1}
edgar.search-base-url=${EDGAR_SEARCH_BASE_URL:https://efts.sec.gov}
edgar.search-path=${EDGAR_SEARCH_PATH:/LATEST/search-index}
edgar.rate-limit.max-requests=${EDGAR_RATE_LIMIT_MAX_REQUESTS:10}
edgar.rate-limit.window-millis=${EDGAR_RATE_LIMIT_WINDOW_MILLIS:1000}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${AUTH0_DOMAIN}/
auth0.audience=${AUTH0_AUDIENCE}

# Comma-separated list of browser origins allowed to call the API (CORS).
# Defaults to the local web app; override per-environment with CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ssv}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ssv}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ssv}

market.prices.fetch-frequency-ms=${MARKET_PRICES_FETCH_FREQUENCY_MS:900000}
market.prices.source=${MARKET_PRICES_SOURCE:yahoo-finance}
market.prices.base-url=${MARKET_PRICES_BASE_URL:https://query1.finance.yahoo.com}
market.prices.quote-path=${MARKET_PRICES_QUOTE_PATH:/v8/finance/chart/%s}
market.prices.api-key=${YAHOO_FINANCE_API_KEY:}

spring.jpa.hibernate.ddl-auto=validate
